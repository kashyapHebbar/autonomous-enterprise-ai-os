name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validation:
    name: Lint, test, smoke, demo, and manifests
    runs-on: [self-hosted, macOS, ARM64, aeai-os]
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify Python
        run: python3.11 --version

      - name: Install dependencies
        run: |
          python3.11 -m pip install --upgrade pip
          make install

      - name: Lint
        run: make lint

      - name: Test
        run: make test

      - name: Smoke check
        run: make smoke

      - name: Procurement demo
        run: make demo

      - name: Kubernetes manifest validation
        run: make k8s-validate

      - name: Cloud deployment validation
        run: make cloud-validate
