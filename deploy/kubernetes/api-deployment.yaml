apiVersion: apps/v1
kind: Deployment
metadata:
  name: aeai-api
  namespace: aeai-os
  labels:
    app.kubernetes.io/name: aeai-api
    app.kubernetes.io/part-of: autonomous-enterprise-ai-os
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aeai-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aeai-api
        app.kubernetes.io/part-of: autonomous-enterprise-ai-os
    spec:
      terminationGracePeriodSeconds: 30
      initContainers:
        - name: validate-runtime-config
          image: ghcr.io/kashyaphebbar/autonomous-enterprise-ai-os:latest
          imagePullPolicy: IfNotPresent
          command:
            - python
          args:
            - scripts/validate_runtime_config.py
            - --component
            - api
          envFrom:
            - configMapRef:
                name: aeai-config
            - secretRef:
                name: aeai-secrets
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
      containers:
        - name: api
          image: ghcr.io/kashyaphebbar/autonomous-enterprise-ai-os:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: aeai-config
            - secretRef:
                name: aeai-secrets
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 30
            periodSeconds: 2
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
