apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aeai-api
  namespace: aeai-os
  annotations:
    alb.ingress.kubernetes.io/load-balancer-attributes: routing.http.drop_invalid_header_fields.enabled=true,routing.http.xff_client_port.enabled=true
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/ssl-policy: ELBSecurityPolicy-TLS13-1-2-2021-06
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/certificate-arn: REPLACE_WITH_ACM_CERTIFICATE_ARN
    alb.ingress.kubernetes.io/wafv2-acl-arn: REPLACE_WITH_WAF_ACL_ARN
    external-dns.alpha.kubernetes.io/hostname: REPLACE_WITH_PUBLIC_HOSTNAME
spec:
  ingressClassName: alb
  rules:
    - host: REPLACE_WITH_PUBLIC_HOSTNAME
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: aeai-api
                port:
                  name: http
