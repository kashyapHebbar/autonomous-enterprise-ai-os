apiVersion: v1
kind: ConfigMap
metadata:
  name: aeai-config
  namespace: aeai-os
data:
  AEAI_ENV: "production"
  AEAI_AUTH_ENABLED: "true"
  AEAI_AUTH_MODE: "oidc"
  AEAI_OIDC_ISSUER: "REPLACE_WITH_OIDC_ISSUER"
  AEAI_OIDC_AUDIENCE: "REPLACE_WITH_OIDC_AUDIENCE"
  AEAI_OIDC_JWKS_URL: "REPLACE_WITH_OIDC_JWKS_URL"
  AEAI_RUN_REPOSITORY_CREATE_SCHEMA: "false"
  AEAI_WORKFLOW_EXECUTION_MODE: "async"
  AEAI_WORKFLOW_QUEUE_BACKEND: "redis"
  AEAI_ARTIFACT_STORAGE_BACKEND: "s3"
  AEAI_ARTIFACT_S3_BUCKET: "REPLACE_WITH_ARTIFACT_BUCKET"
  AEAI_ARTIFACT_S3_REGION: "REPLACE_WITH_AWS_REGION"
  AEAI_ARTIFACT_S3_ENDPOINT_URL: ""
  AEAI_TRACE_EXPORTER: "otlp_grpc"
  AEAI_OTEL_EXPORTER_OTLP_ENDPOINT: "REPLACE_WITH_PRODUCTION_OTLP_ENDPOINT"
  AEAI_OTEL_EXPORTER_OTLP_INSECURE: "false"
