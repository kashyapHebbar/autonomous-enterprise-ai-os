apiVersion: v1
kind: ConfigMap
metadata:
  name: aeai-config
  namespace: aeai-os
data:
  AEAI_ENV: "production"
  AEAI_AUTH_ENABLED: "true"
  AEAI_RUN_REPOSITORY_CREATE_SCHEMA: "false"
  AEAI_WORKFLOW_EXECUTION_MODE: "async"
  AEAI_WORKFLOW_QUEUE_BACKEND: "redis"
  AEAI_ARTIFACT_STORAGE_BACKEND: "s3"
  AEAI_ARTIFACT_S3_ENDPOINT_URL: ""
  AEAI_TRACE_EXPORTER: "otlp_grpc"
  AEAI_OTEL_EXPORTER_OTLP_ENDPOINT: "REPLACE_WITH_PRODUCTION_OTLP_ENDPOINT"
  AEAI_OTEL_EXPORTER_OTLP_INSECURE: "false"
