apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: aeai-secrets
  namespace: aeai-os
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: aeai-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - extract:
        key: REPLACE_WITH_RUNTIME_SECRET_NAME
