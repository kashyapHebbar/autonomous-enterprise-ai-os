apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: aeai-worker
  namespace: aeai-os
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: aeai-worker
  minReplicas: 2
  maxReplicas: 20
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
