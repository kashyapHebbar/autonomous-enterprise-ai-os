apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: aeai-production-alerts
  namespace: aeai-os
  labels:
    app.kubernetes.io/part-of: autonomous-enterprise-ai-os
spec:
  groups:
    - name: aeai.slo
      rules:
        - alert: AeaiApiUnavailable
          expr: min_over_time(up{job=~".*aeai-api.*"}[5m]) < 1
          for: 5m
          labels:
            severity: critical
            owner: platform-on-call
            runbook: api-unavailable
          annotations:
            summary: Enterprise AI OS API is unavailable
            runbook_url: https://github.com/kashyapHebbar/autonomous-enterprise-ai-os/blob/main/docs/operations/incident-runbooks.md#api-unavailable
        - alert: AeaiRunFailureRateHigh
          expr: aeai_runs_by_status{status="failed"} / clamp_min(aeai_runs_total, 1) > 0.05
          for: 15m
          labels:
            severity: warning
            owner: ai-platform-on-call
            runbook: run-failures
          annotations:
            summary: More than 5 percent of tracked runs are failed
            runbook_url: https://github.com/kashyapHebbar/autonomous-enterprise-ai-os/blob/main/docs/operations/incident-runbooks.md#run-failures
        - alert: AeaiWorkflowDeadLetters
          expr: aeai_workflow_jobs_total{status="dead_letter"} > 0
          for: 5m
          labels:
            severity: critical
            owner: workflow-on-call
            runbook: dead-letter-jobs
          annotations:
            summary: Workflow jobs require manual recovery
            runbook_url: https://github.com/kashyapHebbar/autonomous-enterprise-ai-os/blob/main/docs/operations/incident-runbooks.md#dead-letter-jobs
        - alert: AeaiRunLatencyBudgetBurn
          expr: histogram_quantile(0.95, sum by (le) (rate(aeai_run_duration_seconds_bucket[15m]))) > 120
          for: 15m
          labels:
            severity: warning
            owner: ai-platform-on-call
            runbook: latency
          annotations:
            summary: Run p95 latency is above the 120 second objective
            runbook_url: https://github.com/kashyapHebbar/autonomous-enterprise-ai-os/blob/main/docs/operations/incident-runbooks.md#run-latency
