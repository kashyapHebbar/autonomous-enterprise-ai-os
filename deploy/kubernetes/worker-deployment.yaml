apiVersion: apps/v1
kind: Deployment
metadata:
  name: aeai-worker
  namespace: aeai-os
  labels:
    app.kubernetes.io/name: aeai-worker
    app.kubernetes.io/part-of: autonomous-enterprise-ai-os
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aeai-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aeai-worker
        app.kubernetes.io/part-of: autonomous-enterprise-ai-os
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: worker
          image: ghcr.io/kashyaphebbar/autonomous-enterprise-ai-os:latest
          imagePullPolicy: IfNotPresent
          command:
            - python
          args:
            - scripts/run_workflow_worker.py
            - --loop
            - --poll-interval
            - "5"
          envFrom:
            - configMapRef:
                name: aeai-config
            - secretRef:
                name: aeai-secrets
          readinessProbe:
            exec:
              command:
                - python
                - -c
                - "import aeai_os; print('ready')"
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
          livenessProbe:
            exec:
              command:
                - python
                - -c
                - "import aeai_os; print('alive')"
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
