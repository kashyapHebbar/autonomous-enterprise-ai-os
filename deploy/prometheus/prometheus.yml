global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: aeai-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - api:8000
        labels:
          service: autonomous-enterprise-ai-os
          component: api

  - job_name: aeai-local-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:8000
        labels:
          service: autonomous-enterprise-ai-os
          component: api-local
