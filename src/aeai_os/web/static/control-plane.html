<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Control Plane | Autonomous Enterprise AI OS</title>
    <link rel="stylesheet" href="/app/control-plane.css?v=visual-polish-2" />
    <link rel="stylesheet" href="/app/app-shell.css?v=visual-polish-2" />
  </head>
  <body>
    <main class="shell product-shell">
      <aside class="sidebar" aria-label="Application navigation">
        <a class="brand" href="/app">
          <span class="brand-mark" aria-hidden="true">AE</span>
          <span class="brand-copy">
            <strong>Enterprise AI OS</strong>
            <span>Autonomous control plane</span>
          </span>
        </a>
        <nav class="app-nav" aria-label="Primary">
          <a href="/app" aria-current="page"><span class="nav-icon" aria-hidden="true">R</span><span>Runs</span></a>
          <a href="/app/artifacts"><span class="nav-icon" aria-hidden="true">A</span><span>Artifacts</span></a>
          <a href="/app/admin"><span class="nav-icon" aria-hidden="true">G</span><span>Governance</span></a>
          <a href="/docs"><span class="nav-icon" aria-hidden="true">D</span><span>API Docs</span></a>
        </nav>
        <div class="sidebar-footer">
          <div class="system-chip"><span>Mode</span><strong>Local</strong></div>
          <div class="system-chip"><span>Release</span><strong>v1.0</strong></div>
        </div>
      </aside>

      <div class="workspace-shell">
        <section class="intro-band" aria-labelledby="pageTitle">
          <div>
            <p class="eyebrow">Control plane</p>
            <h1 id="pageTitle">Runs</h1>
          </div>
          <div class="page-actions">
            <span class="status-pill">Orchestrator</span>
            <button class="icon-button" id="refreshRuns" type="button" title="Refresh runs">
              <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M20 6v5h-5" />
                <path d="M4 18v-5h5" />
                <path d="M18.2 9A7 7 0 0 0 6.4 6.4L4 8.8" />
                <path d="M5.8 15A7 7 0 0 0 17.6 17.6L20 15.2" />
              </svg>
              <span class="sr-only">Refresh</span>
            </button>
          </div>
        </section>

        <section class="control-grid">
          <section class="panel create-panel" aria-labelledby="createRunTitle">
            <div class="section-heading">
              <div>
                <p class="eyebrow">New workflow</p>
                <h2 id="createRunTitle">Create Run</h2>
              </div>
              <span class="status-pill" id="sourceStatus">Loading sources</span>
            </div>

            <form id="createRunForm" class="run-form">
              <label class="field">
                <span>Task</span>
                <textarea
                  id="taskInput"
                  name="task"
                  rows="5"
                  required
                  minlength="3"
                  maxlength="4000"
                  placeholder="Analyze procurement spend and create a dashboard."
                ></textarea>
              </label>

              <fieldset class="segmented-field">
                <legend>Dataset</legend>
                <label>
                  <input type="radio" name="datasetMode" value="none" checked />
                  <span>None</span>
                </label>
                <label>
                  <input type="radio" name="datasetMode" value="source" />
                  <span>Source</span>
                </label>
                <label>
                  <input type="radio" name="datasetMode" value="uri" />
                  <span>URI</span>
                </label>
              </fieldset>

              <label class="field" id="sourceField" hidden>
                <span>Data Source</span>
                <select id="dataSourceSelect" name="dataSourceId"></select>
              </label>

              <label class="field" id="uriField" hidden>
                <span>Dataset URI</span>
                <input
                  id="datasetUriInput"
                  name="datasetUri"
                  type="text"
                  maxlength="2048"
                  placeholder="s3://bucket/procurement.csv"
                />
              </label>

              <div class="form-actions">
                <button class="primary-button" id="createRunButton" type="submit">
                  Create Run
                </button>
                <p class="action-text" id="formStatus" aria-live="polite"></p>
              </div>
            </form>

            <div class="created-run" id="createdRun" hidden></div>
          </section>

          <section class="panel runs-panel" aria-labelledby="runsListTitle">
            <div class="section-heading">
              <div>
                <p class="eyebrow">Recent activity</p>
                <h2 id="runsListTitle">Run Queue</h2>
              </div>
              <span class="status-pill" id="runCount">--</span>
            </div>
            <div class="run-list" id="runsList"></div>
          </section>
        </section>
      </div>
    </main>
    <script src="/app/control-plane.js?v=visual-polish-2" defer></script>
  </body>
</html>
